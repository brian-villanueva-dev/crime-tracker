# ---------------------------------------------------------------------------
# NOPD Crime Alert Monitor — secrets template
#
# THIS FILE is committed to git as a setup guide.
# DO NOT put real credentials here.
#
# To set up:
#   cp secrets.template.yaml secrets.yaml
#   # then edit secrets.yaml with your actual values
# ---------------------------------------------------------------------------

socrata:
  # Free app token — reduces rate-limit risk. Get one at:
  # https://data.nola.gov  →  Sign In / Register  →  Profile  →  Developer Settings  →  App Tokens
  app_token: "YOUR_SOCRATA_APP_TOKEN"

# --- Email (Gmail + App Password) -------------------------------------------
# Set notifications.method: "email" in config.yaml to use this.
# See README for step-by-step Gmail App Password instructions.
email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "your_gmail_address@gmail.com"
  # This is a 16-character App Password, NOT your regular Gmail password.
  password: "YOUR_GMAIL_APP_PASSWORD"
  # List all addresses that should receive alerts.
  recipients:
    - "recipient_one@example.com"
    - "recipient_two@example.com"

# --- SMS (Twilio) -------------------------------------------------------------
# Set notifications.method: "sms" in config.yaml to use this.
# See README for Twilio trial account setup.
sms:
  twilio_account_sid: "YOUR_TWILIO_ACCOUNT_SID"       # Starts with AC…
  twilio_auth_token: "YOUR_TWILIO_AUTH_TOKEN"
  from_number: "+1XXXXXXXXXX"                          # Your Twilio phone number
  # List all numbers that should receive SMS alerts.
  # Trial accounts: recipients must be verified in the Twilio console.
  to_numbers:
    - "+1XXXXXXXXXX"

# --- Webhook (e.g. n8n) -------------------------------------------------------
# Set notifications.method: "webhook" in config.yaml to use this.
# The script will POST JSON with keys: message, incident, timestamp.
webhook:
  url: "https://your-n8n-instance.example.com/webhook/YOUR_WEBHOOK_ID"
  # Optional headers (e.g. for authentication). Remove or leave empty if not needed.
  headers:
    Authorization: "Bearer YOUR_WEBHOOK_SECRET"

# --- Google Sheets logging ----------------------------------------------------
# Required when sheets.enabled: true in config.yaml.
# The spreadsheet must be shared with the service account email address.
#
# To set up:
#   1. Create a project at console.cloud.google.com
#   2. Enable the Google Sheets API
#   3. Create a Service Account (IAM → Service Accounts → Create)
#   4. Download a JSON key for the service account
#   5. Share your Google Sheet with the service account email (Editor access)
#   6. Copy the spreadsheet ID from the sheet URL:
#      https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit
sheets:
  spreadsheet_id: "YOUR_SPREADSHEET_ID"
  # Absolute path to the service account JSON key file downloaded in step 4.
  service_account_json: "/path/to/service-account.json"
